<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0D1B2A"/>

  <!-- Circuit board traces -->
  <line x1="4" y1="16" x2="9" y2="16" stroke="#00C8FF" stroke-width="1" opacity="0.4"/>
  <line x1="23" y1="16" x2="28" y2="16" stroke="#00C8FF" stroke-width="1" opacity="0.4"/>
  <line x1="16" y1="4" x2="16" y2="8" stroke="#00C8FF" stroke-width="1" opacity="0.4"/>
  <line x1="16" y1="24" x2="16" y2="28" stroke="#00C8FF" stroke-width="1" opacity="0.4"/>

  <!-- Corner nodes -->
  <circle cx="4" cy="16" r="1" fill="#00C8FF" opacity="0.6"/>
  <circle cx="28" cy="16" r="1" fill="#00C8FF" opacity="0.6"/>
  <circle cx="16" cy="4" r="1" fill="#00C8FF" opacity="0.6"/>
  <circle cx="16" cy="28" r="1" fill="#00C8FF" opacity="0.6"/>

  <!-- Upward trending chart line (main icon) -->
  <polyline
    points="7,22 11,18 14,20 18,13 21,15 25,9"
    stroke="#00C8FF"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Chart area fill (subtle) -->
  <polygon
    points="7,22 11,18 14,20 18,13 21,15 25,9 25,24 7,24"
    fill="url(#chartGrad)"
    opacity="0.15"
  />

  <!-- Data point dots -->
  <circle cx="7"  cy="22" r="1.2" fill="#00C8FF"/>
  <circle cx="11" cy="18" r="1.2" fill="#00C8FF"/>
  <circle cx="14" cy="20" r="1.2" fill="#4FC3F7"/>
  <circle cx="18" cy="13" r="1.5" fill="#00E5FF"/>
  <circle cx="21" cy="15" r="1.2" fill="#4FC3F7"/>
  <circle cx="25" cy="9"  r="1.8" fill="#00E5FF"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00C8FF"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="15" stroke="#00C8FF" stroke-width="0.8" opacity="0.3"/>
</svg>